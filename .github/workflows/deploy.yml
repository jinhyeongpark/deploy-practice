name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ] # 모든 브랜치 푸시 시 테스트 실행
  pull_request:
    branches: [ "main", "dev" ] # main, dev로의 PR 시 테스트 실행

jobs:
  # [JOB 1] CI: 테스트 및 빌드 검증
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 만약 Redis 등이 필요하면 여기에 'services' 섹션을 추가
      - name: Run Tests
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

      # 테스트 결과 리포트 저장
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-report
          path: build/reports/tests/test

  # [JOB 2] CD: 실제 서버 배포
  deploy:
    needs: test # 테스트가 성공해야만 배포 시작
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/deploy-practice-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            sudo docker compose version
            if [ ! -f "deploy-practice/docker-compose.yml" ]; then
              echo "첫 배포입니다. 클론을 시작합니다..."
              git clone https://github.com/${{ github.repository }}.git deploy-practice
            fi
            
            cd deploy-practice
            git pull origin ${{ github.ref_name }}
            
            # 1. 환경변수 파일 생성 
            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            SPRING_DB_PW=${{ secrets.SPRING_DB_PW }}
            MYSQL_ROOT_PW=${{ secrets.MYSQL_ROOT_PW }}
            TZ=Asia/Seoul
            EOF
            
            # 2. 컨테이너 갱신
            sudo docker compose down || true
            sudo docker compose pull
            sudo docker compose up -d 
            
            # 3. 프리티어 용량 관리를 위한 정리 (중요!)
            sudo docker image prune -f
